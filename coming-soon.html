<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>قريباً - Gaber Talaat</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Cairo', sans-serif; background: #0a0a0a; color: #fff; overflow-x: hidden; min-height: 100vh; display: flex; flex-direction: column; }
        #matrix-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; background: #0a0a0a; }
      .header { display: flex; justify-content: space-between; align-items: center; padding: 25px 5%; background: linear-gradient(90deg, rgba(26,26,26,0.9), rgba(15,15,15,0.9)); border-bottom: 3px solid #00ff88; position: relative; z-index: 1; backdrop-filter: blur(5px); }
      .header-info h1 { font-weight: 900; color: #00ff88; font-size: 32px; margin-bottom: 8px; text-shadow: 0 0 15px rgba(0,255,136,0.5); }
      .header-info a { color: #aaa; text-decoration: none; font-size: 15px; font-weight: 600; transition: 0.3s; }
      .header-info a:hover { color: #00ff88; }
      .profile-pic { width: 90px; height: 90px; border-radius: 50%; border: 4px solid #00ff88; object-fit: cover; box-shadow: 0 0 20px rgba(0,255,136,0.4); }
      .coming-container { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 40px 5%; position: relative; z-index: 1; }
      .coming-box { background: rgba(17,17,17,0.85); padding: 50px 40px; border-radius: 20px; border: 2px solid #00ff88; backdrop-filter: blur(5px); max-width: 600px; box-shadow: 0 0 40px rgba(0,255,136,0.2); }
      .coming-box i { font-size: 80px; color: #00ff88; margin-bottom: 25px; animation: pulse 2s ease-in-out infinite; }
        @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.1); opacity: 0.8; } }
      .coming-box h2 { font-size: 42px; font-weight: 900; color: #00ff88; margin-bottom: 15px; text-shadow: 0 0 20px rgba(0,255,136,0.5); }
      .coming-box p { font-size: 18px; color: #ccc; line-height: 1.8; margin-bottom: 30px; }
      .countdown { display: flex; gap: 20px; justify-content: center; margin-bottom: 35px; flex-wrap: wrap; }
      .countdown-item { background: rgba(0,255,136,0.1); border: 2px solid #00ff88; border-radius: 12px; padding: 15px 20px; min-width: 80px; }
      .countdown-item.num { font-size: 32px; font-weight: 900; color: #00ff88; display: block; }
      .countdown-item.label { font-size: 13px; color: #aaa; font-weight: 600; }
      .back-btn { display: inline-block; background: linear-gradient(90deg, #00ff88, #00cc6a); color: #000; padding: 15px 40px; border-radius: 50px; font-weight: 900; font-size: 18px; text-decoration: none; transition: 0.3s; }
      .back-btn:hover { transform: scale(1.05); box-shadow: 0 0 30px rgba(0,255,136,0.6); }
      .notify-box { margin-top: 30px; padding-top: 30px; border-top: 2px solid #222; }
      .notify-box p { font-size: 15px; color: #888; margin-bottom: 15px; }
      .instagram-btn { display: inline-block; background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888); color: #fff; padding: 12px 30px; border-radius: 50px; font-weight: 700; text-decoration: none; transition: 0.3s; }
      .instagram-btn:hover { transform: scale(1.05); box-shadow: 0 0 25px rgba(220,39,67,0.6); }
        @media (max-width: 768px) {.coming-box { padding: 40px 25px; }.coming-box h2 { font-size: 32px; }.countdown-item { min-width: 70px; padding: 12px 15px; } }
    </style>
</head>
<body>
    <canvas id="matrix-bg"></canvas>
    <div class="header">
        <div class="header-info">
            <h1>Gaber Talaat</h1>
            <a href="index.html"><i class="fas fa-arrow-right"></i> رجوع للرئيسية</a>
        </div>
        <img src="gaber.jpg" alt="Gaber Talaat" class="profile-pic">
    </div>

    <div class="coming-container">
        <div class="coming-box">
            <i class="fas fa-tools"></i>
            <h2>قريباً...</h2>
            <p>جابر شغال دلوقتي على تجهيز القسم ده بأقوى الملفات والكورسات المجانية. خليك متابع عشان تكون أول واحد يحمل.</p>

            <div class="countdown">
                <div class="countdown-item">
                    <span class="num" id="days">07</span>
                    <span class="label">يوم</span>
                </div>
                <div class="countdown-item">
                    <span class="num" id="hours">12</span>
                    <span class="label">ساعة</span>
                </div>
                <div class="countdown-item">
                    <span class="num" id="minutes">45</span>
                    <span class="label">دقيقة</span>
                </div>
            </div>

            <a href="index.html" class="back-btn"><i class="fas fa-home"></i> ارجع للرئيسية</a>

            <div class="notify-box">
                <p>عايز يوصلك إشعار أول ما ينزل؟</p>
                <a href="https://www.instagram.com/g.t.m_27?igsh=MWFmam52aGRsdTcydQ==" target="_blank" class="instagram-btn">
                    <i class="fab fa-instagram"></i> اعملي فولو على انستجرام
                </a>
            </div>
        </div>
    </div>

    <script>
        // عداد تنازلي وهمي - هيعد من 7 أيام
        let timeLeft = 7 * 24 * 60 * 60;
        function updateCountdown() {
            const days = Math.floor(timeLeft / (24 * 60 * 60));
            const hours = Math.floor((timeLeft % (24 * 60 * 60)) / (60 * 60));
            const minutes = Math.floor((timeLeft % (60 * 60)) / 60);
            document.getElementById('days').textContent = String(days).padStart(2, '0');
            document.getElementById('hours').textContent = String(hours).padStart(2, '0');
            document.getElementById('minutes').textContent = String(minutes).padStart(2, '0');
            if(timeLeft > 0) timeLeft--;
        }
        setInterval(updateCountdown, 1000);
        updateCountdown();

        // خلفية الماتريكس
        const canvas = document.getElementById('matrix-bg');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        const code = 'COMING SOON قريباً GABER TALAAT 01 ';
        const chars = code.split('');
        const fontSize = 14;
        const columns = canvas.width / fontSize;
        const drops = Array(Math.floor(columns)).fill(1);
        function draw() {
            ctx.fillStyle = 'rgba(10, 10, 10, 0.05)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#00ff88';
            ctx.font = fontSize + 'px monospace';
            for(let i = 0; i < drops.length; i++) {
                const text = chars[Math.floor(Math.random() * chars.length)];
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                if(drops[i] * fontSize > canvas.height && Math.random() > 0.975) { drops[i] = 0; }
                drops[i]++;
            }
        }
        setInterval(draw, 35);
        window.addEventListener('resize', () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; });
    </script>
</body>
</html>
